name: Update Dynamic Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update commit count in README
        run: |
          # Get total commits via GraphQL
          COMMITS=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ viewer { contributionsCollection { totalCommitContributions } } }"}' \
            "https://api.github.com/graphql" | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['viewer']['contributionsCollection']['totalCommitContributions'])")
          
          # Get total repos
          REPOS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/user/repos?per_page=1" -I 2>/dev/null | grep -i "link:" | grep -o 'page=[0-9]*' | tail -1 | cut -d= -f2)
          
          # Update README with dynamic values
          sed -i "s/total-commits-badge.*\"/total-commits-badge\/$COMMITS\"/" README.md || true
          
          echo "Commits: $COMMITS, Repos: $REPOS"
